<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }}</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@4.0.0-beta3"
    integrity="sha384-bq4nTap5u8w4XlVP8JHkDioQVZBI5wUx5PxNwlbCq27H5QJ+q0CSeJcTYU+PLdCp"
    crossorigin="anonymous"></script>
  <style>
    .htmx-swapping {
      opacity: 0;
      transition: opacity 0.15s ease-out;
    }

    .htmx-settling {
      opacity: 1;
      transition: opacity 0.15s ease-in;
    }

    /* Temporary while tailwind is cdn */
    body {
      background: #09090b;
    }
  </style>
</head>

<body class="bg-zinc-950 text-white min-h-screen">
  <nav class="border-b border-zinc-800 bg-zinc-950">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-14">
      <span class="text-sm font-mono text-zinc-400">grug<span class="text-indigo-400">flow</span></span>

      {{/* Desktop */}}
      <div class="hidden md:flex items-center gap-1">
        {{ range .NavItems }}
        <a href="{{ .Href }}"
          class="px-3 py-1.5 rounded-lg text-sm {{ if eq .Href $.Href }}text-indigo-400 bg-indigo-950{{ else }}text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800{{ end }}">
          {{ .Label }}
        </a>
        {{ end }}
      </div>

      {{/* Mobile burger */}}
      <button onclick="document.getElementById('mobile-nav').classList.toggle('hidden')"
        class="md:hidden text-zinc-400 border border-zinc-800 rounded-lg p-1.5">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
    </div>

    {{/* Mobile menu */}}
    <div id="mobile-nav" class="hidden md:hidden border-t border-zinc-800 px-4 py-2 flex flex-col gap-1">
      {{ range .NavItems }}
      <a href="{{ .Href }}"
        class="px-3 py-2 rounded-lg text-sm {{ if eq .Href $.Href }}text-indigo-400 bg-indigo-950{{ else }}text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800{{ end }}">
        {{ .Label }}
      </a>
      {{ end }}
    </div>
  </nav>

  <header class="p-4 border-b border-zinc-800">
    <h1 class="text-xl font-bold">{{ .Title }}</h1>
  </header>

  <main class="px-4 py-8 md:px-8 md:py-12">
    <div class="max-w-3xl mx-auto w-full">
      <div hx-get="{{ (index .Widgets 0).URL }}" hx-trigger="load" hx-swap="outerHTML"
        class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 md:p-8 min-h-64 flex items-center justify-center">
        <span class="text-zinc-500 animate-pulse text-sm"></span>
      </div>
    </div>
  </main>

</body>

</html>
